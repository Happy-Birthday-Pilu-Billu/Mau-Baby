<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Birthday Countdown</title>

<!--
  ============================================================================
  HOW TO CUSTOMIZE THIS SITE
  ============================================================================
  Everything you'll want to change lives in the CONFIG object near the top
  of the <script> tag at the bottom of this file. Look for:

    NAME                 -> your friend's name
    START_DATE            -> the day the "Day 1" counter should start
    BIRTHDAY              -> the exact moment the birthday begins
    BACKGROUND_IMAGE_URL   -> the main background photo
    LETTER_BACKGROUND_URL  -> background photo behind the hidden letter
    LETTER_TEXT            -> the words in the hidden letter

  See the README.md file for full instructions on hosting this for free
  on GitHub Pages and swapping in your own images.
  ============================================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,600&family=Quicksand:wght@400;500;600;700&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet">

<style>
  :root{
    --midnight: #0b1026;
    --plum: #2d1b4e;
    --gold: #e8b14d;
    --blush: #f2a6b0;
    --cream: #fdf6ec;
    --ember: #ff7a59;
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0;
    padding:0;
    height:100%;
    width:100%;
    overflow-x:hidden;
    font-family:'Quicksand', sans-serif;
    color:var(--cream);
    background:
      radial-gradient(ellipse at top, rgba(45,27,78,0.55), transparent 60%),
      linear-gradient(180deg, var(--midnight) 0%, #150c2b 55%, #1c0f2e 100%);
  }

  /* ---------- background layer (swap image via CONFIG.BACKGROUND_IMAGE_URL) ---------- */
  #bg-photo{
    position:fixed;
    inset:0;
    background-size:cover;
    background-position:center;
    z-index:-3;
    opacity:0.38;
    filter:saturate(0.9);
    transition:opacity 1.2s ease;
  }
  #bg-photo.after-glow{ opacity:0.5; }

  #bg-veil{
    position:fixed;
    inset:0;
    z-index:-2;
    background:
      radial-gradient(circle at 50% 20%, rgba(232,177,77,0.10), transparent 55%),
      linear-gradient(180deg, rgba(11,16,38,0.55) 0%, rgba(11,16,38,0.85) 100%);
  }

  #stars{
    position:fixed;
    inset:0;
    z-index:-1;
    pointer-events:none;
  }

  /* ---------- layout ---------- */
  .stage{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:6vh 6vw;
    position:relative;
  }

  .eyebrow{
    letter-spacing:0.35em;
    text-transform:uppercase;
    font-size:0.7rem;
    color:var(--blush);
    margin-bottom:1.1rem;
    opacity:0.85;
  }

  h1#headline{
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-size:clamp(2.1rem, 6vw, 4.4rem);
    line-height:1.15;
    margin:0 0 0.6rem 0;
    cursor:pointer;
    user-select:none;
    text-shadow: 0 0 40px rgba(232,177,77,0.25);
    transition:transform 0.15s ease;
  }
  h1#headline:active{ transform:scale(0.98); }

  h1#headline .accent{
    font-style:italic;
    color:var(--gold);
  }

  #subline{
    font-size:1rem;
    letter-spacing:0.04em;
    color:rgba(253,246,236,0.75);
    margin-bottom:2.4rem;
    min-height:1.4em;
  }

  /* ---------- countdown ---------- */
  #countdown{
    display:flex;
    gap:clamp(0.8rem, 3vw, 2.2rem);
    margin-bottom:2.6rem;
  }
  .unit{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-width:64px;
  }
  .unit .num{
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size:clamp(1.8rem, 5vw, 3rem);
    line-height:1;
    background:linear-gradient(180deg, var(--cream), var(--blush));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .unit .lbl{
    font-size:0.65rem;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:rgba(253,246,236,0.6);
    margin-top:0.4rem;
  }
  .colon{
    font-family:'Playfair Display', serif;
    font-size:clamp(1.4rem, 4vw, 2.2rem);
    color:var(--gold);
    opacity:0.6;
    align-self:flex-start;
    margin-top:0.15em;
  }

  /* ---------- hidden-surprise button (post-birthday) ---------- */
  #surprise-btn{
    display:none;
    align-items:center;
    gap:0.6rem;
    background:linear-gradient(135deg, rgba(232,177,77,0.18), rgba(242,166,176,0.12));
    border:1px solid rgba(232,177,77,0.55);
    color:var(--cream);
    padding:0.85rem 1.6rem;
    border-radius:999px;
    font-family:'Quicksand', sans-serif;
    font-weight:600;
    font-size:0.95rem;
    letter-spacing:0.03em;
    cursor:pointer;
    backdrop-filter:blur(6px);
    transition:transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    box-shadow:0 8px 24px rgba(232,177,77,0.12);
  }
  #surprise-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 30px rgba(232,177,77,0.22);
    background:linear-gradient(135deg, rgba(232,177,77,0.28), rgba(242,166,176,0.2));
  }
  #surprise-btn .heart{
    display:inline-block;
    font-size:1.05rem;
    animation:pulse-heart 1.4s ease-in-out infinite;
  }

  .hint{
    margin-top:1.6rem;
    font-size:0.72rem;
    letter-spacing:0.08em;
    color:rgba(253,246,236,0.35);
  }

  @keyframes pulse-heart{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.25); }
  }

  /* ---------- confetti / fireworks canvases ---------- */
  #confetti-canvas, #firework-canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:5;
  }

  /* ---------- balloons ---------- */
  #balloon-layer{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:4;
  }
  .balloon{
    position:absolute;
    bottom:-140px;
    width:46px;
    height:58px;
    border-radius:50% 50% 50% 50% / 58% 58% 42% 42%;
    opacity:0.9;
    animation-name:float-up;
    animation-timing-function:ease-in;
    animation-fill-mode:forwards;
  }
  .balloon::after{
    content:'';
    position:absolute;
    left:50%;
    top:100%;
    width:1px;
    height:60px;
    background:rgba(253,246,236,0.35);
    transform:translateX(-50%);
  }
  .balloon::before{
    content:'';
    position:absolute;
    left:50%;
    bottom:100%;
    width:6px;
    height:8px;
    background:inherit;
    clip-path:polygon(50% 0, 0 100%, 100% 100%);
    transform:translateX(-50%);
  }
  @keyframes float-up{
    0%{ transform:translateY(0) translateX(0) rotate(0deg); }
    50%{ transform:translateY(-55vh) translateX(20px) rotate(4deg); }
    100%{ transform:translateY(-115vh) translateX(-15px) rotate(-3deg); opacity:0.85; }
  }

  /* ---------- floating hearts ---------- */
  #heart-layer{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:4;
  }
  .fheart{
    position:absolute;
    bottom:-40px;
    font-size:1.4rem;
    color:var(--blush);
    opacity:0.85;
    animation-name:heart-rise;
    animation-timing-function:ease-out;
    animation-fill-mode:forwards;
  }
  @keyframes heart-rise{
    0%{ transform:translateY(0) scale(0.8); opacity:0.9; }
    100%{ transform:translateY(-105vh) scale(1.1); opacity:0; }
  }

  /* ---------- hidden letter modal ---------- */
  #letter-overlay{
    position:fixed;
    inset:0;
    z-index:50;
    display:none;
    align-items:center;
    justify-content:center;
    padding:5vh 4vw;
    background:rgba(6,4,16,0.78);
    backdrop-filter:blur(6px);
  }
  #letter-overlay.open{ display:flex; }

  #letter-card{
    position:relative;
    max-width:640px;
    width:100%;
    max-height:82vh;
    overflow-y:auto;
    background-color:#20140f;
    background-image:
      linear-gradient(180deg, rgba(20,12,8,0.55), rgba(20,12,8,0.78)),
      var(--letter-bg-image, none);
    background-size:cover;
    background-position:center;
    border:1px solid rgba(232,177,77,0.35);
    border-radius:6px;
    padding:2.6rem 2.4rem;
    box-shadow:0 30px 80px rgba(0,0,0,0.55);
  }

  #letter-close{
    position:absolute;
    top:0.9rem;
    right:1.1rem;
    background:none;
    border:none;
    color:rgba(253,246,236,0.7);
    font-size:1.3rem;
    cursor:pointer;
    line-height:1;
  }
  #letter-close:hover{ color:var(--cream); }

  #letter-heading{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-size:1.4rem;
    color:var(--gold);
    margin:0 0 1.2rem 0;
    text-align:center;
  }

  #letter-text{
    font-family:'Courier Prime', monospace;
    font-size:1rem;
    line-height:1.85;
    white-space:pre-wrap;
    color:var(--cream);
    min-height:120px;
  }

  #letter-text .cursor{
    display:inline-block;
    width:8px;
    background:var(--gold);
    margin-left:2px;
    animation:blink 0.9s steps(2) infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  /* ---------- reduced motion ---------- */
  @media (prefers-reduced-motion: reduce){
    .balloon, .fheart{ animation:none !important; display:none; }
  }

  @media (max-width:480px){
    #countdown{ gap:0.5rem; }
    .unit{ min-width:52px; }
  }
</style>
</head>
<body>

<div id="bg-photo"></div>
<div id="bg-veil"></div>
<canvas id="stars"></canvas>

<canvas id="firework-canvas"></canvas>
<canvas id="confetti-canvas"></canvas>
<div id="balloon-layer"></div>
<div id="heart-layer"></div>

<main class="stage">
  <div class="eyebrow" id="eyebrow">a little countdown, just for you</div>
  <h1 id="headline">Loading…</h1>
  <div id="subline"></div>

  <div id="countdown">
    <div class="unit"><span class="num" id="cd-days">00</span><span class="lbl">days</span></div>
    <div class="colon">:</div>
    <div class="unit"><span class="num" id="cd-hours">00</span><span class="lbl">hrs</span></div>
    <div class="colon">:</div>
    <div class="unit"><span class="num" id="cd-mins">00</span><span class="lbl">min</span></div>
    <div class="colon">:</div>
    <div class="unit"><span class="num" id="cd-secs">00</span><span class="lbl">sec</span></div>
  </div>

  <button id="surprise-btn"><span class="heart">❤</span> Hidden Surprise <span class="heart">❤</span></button>

  <div class="hint" id="tap-hint">psst — tap the name above, five times</div>
</main>

<div id="letter-overlay">
  <div id="letter-card">
    <button id="letter-close" aria-label="Close letter">✕</button>
    <div id="letter-heading">a letter, just for you</div>
    <div id="letter-text"></div>
  </div>
</div>

<script>
/* ============================================================================
   CONFIG — this is the only section you should need to touch.
   ============================================================================ */
const CONFIG = {
  // Your friend's name, exactly how you want it to appear.
  NAME: "ABCD-ABCD",

  // "Day 1" starts counting from this date (local time). Defaults to the
  // day you're setting this site up. Format: YYYY-MM-DDTHH:MM:SS
  START_DATE: "2026-07-23T00:00:00",

  // The exact moment the birthday message takes over. Midnight going into
  // July 30th, i.e. the very start of July 30th.
  BIRTHDAY: "2026-07-30T00:00:00",

  // Main background photo. Leave BACKGROUND_IMAGE_URL as "" to use the
  // built-in midnight gradient, or paste an image URL / local path here,
  // e.g. "images/us.jpg" (put the file in an /images folder next to this
  // file and commit it alongside index.html).
  BACKGROUND_IMAGE_URL: "",

  // Background photo shown behind the hidden letter. Same rules as above.
  LETTER_BACKGROUND_URL: "",

  // The hidden letter's text. Use \n for a new line / paragraph break.
  LETTER_TEXT:
`My dearest ABCD-ABCD,

If you're reading this, it means you found the little secret hiding behind all the noise.

I wanted today to feel the way you make every day feel for the people around you — a little brighter, a little warmer, a little more like home.

So here's to you. To every year that's brought you here, and every one still on its way.

Happy birthday, to my everything.

— always`
};

/* ============================================================================
   Below this line is the machinery that makes the page work.
   You shouldn't need to edit anything past here.
   ============================================================================ */

const els = {
  headline: document.getElementById('headline'),
  subline: document.getElementById('subline'),
  eyebrow: document.getElementById('eyebrow'),
  countdown: document.getElementById('countdown'),
  days: document.getElementById('cd-days'),
  hours: document.getElementById('cd-hours'),
  mins: document.getElementById('cd-mins'),
  secs: document.getElementById('cd-secs'),
  surpriseBtn: document.getElementById('surprise-btn'),
  hint: document.getElementById('tap-hint'),
  bgPhoto: document.getElementById('bg-photo'),
  letterOverlay: document.getElementById('letter-overlay'),
  letterCard: document.getElementById('letter-card'),
  letterClose: document.getElementById('letter-close'),
  letterText: document.getElementById('letter-text'),
};

const startDate = new Date(CONFIG.START_DATE);
const birthday = new Date(CONFIG.BIRTHDAY);

if (CONFIG.BACKGROUND_IMAGE_URL) {
  els.bgPhoto.style.backgroundImage = `url("${CONFIG.BACKGROUND_IMAGE_URL}")`;
}
if (CONFIG.LETTER_BACKGROUND_URL) {
  els.letterCard.style.setProperty('--letter-bg-image', `url("${CONFIG.LETTER_BACKGROUND_URL}")`);
}

let phase = null; // 'before' | 'after'

function pad(n){ return String(n).padStart(2,'0'); }

function render(){
  const now = new Date();
  const msLeft = birthday - now;

  if (msLeft > 0) {
    if (phase !== 'before') enterBeforePhase();
    const totalSec = Math.floor(msLeft/1000);
    const d = Math.floor(totalSec/86400);
    const h = Math.floor((totalSec%86400)/3600);
    const m = Math.floor((totalSec%3600)/60);
    const s = totalSec%60;
    els.days.textContent = pad(d);
    els.hours.textContent = pad(h);
    els.mins.textContent = pad(m);
    els.secs.textContent = pad(s);

    const dayNumber = Math.max(1, Math.floor((now - startDate)/86400000) + 1);
    els.headline.innerHTML = `Day ${dayNumber}: Happy Birthday <span class="accent">${CONFIG.NAME}</span>`;
    els.subline.textContent = `${d} day${d===1?'':'s'} to go`;
  } else {
    if (phase !== 'after') enterAfterPhase();
  }
}

function enterBeforePhase(){
  phase = 'before';
  els.eyebrow.textContent = 'a little countdown, just for you';
  els.countdown.style.display = 'flex';
  els.surpriseBtn.style.display = 'none';
  els.hint.style.display = 'block';
  els.bgPhoto.classList.remove('after-glow');
}

function enterAfterPhase(){
  phase = 'after';
  els.eyebrow.textContent = 'it finally came';
  els.headline.innerHTML = `Happy Birthday to my <span class="accent">Everything</span>`;
  els.subline.textContent = `${CONFIG.NAME} — today is yours`;
  els.countdown.style.display = 'none';
  els.surpriseBtn.style.display = 'inline-flex';
  els.hint.style.display = 'none';
  els.bgPhoto.classList.add('after-glow');
  celebrateBig();
}

setInterval(render, 1000);
render();

/* ---------------- tap-5-times to open letter (pre-birthday) ---------------- */
let tapCount = 0;
let tapTimer = null;
els.headline.addEventListener('click', () => {
  if (phase === 'after') return; // after birthday, the button handles it
  tapCount++;
  clearTimeout(tapTimer);
  tapTimer = setTimeout(() => { tapCount = 0; }, 3000);
  if (tapCount >= 5) {
    tapCount = 0;
    openLetter();
  }
});

els.surpriseBtn.addEventListener('click', openLetter);
els.letterClose.addEventListener('click', closeLetter);
els.letterOverlay.addEventListener('click', (e) => {
  if (e.target === els.letterOverlay) closeLetter();
});

let typing = false;
function openLetter(){
  els.letterOverlay.classList.add('open');
  if (typing) return;
  typing = true;
  els.letterText.innerHTML = '';
  const text = CONFIG.LETTER_TEXT;
  let i = 0;
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  cursor.textContent = '\u00A0';

  function typeNext(){
    if (i < text.length) {
      els.letterText.textContent = text.slice(0, i+1);
      els.letterText.appendChild(cursor);
      i++;
      const c = text[i-1];
      const delay = (c === '.' || c === ',') ? 90 : 24;
      setTimeout(typeNext, delay);
    } else {
      typing = false;
    }
  }
  typeNext();
  burstHearts(24);
}

function closeLetter(){
  els.letterOverlay.classList.remove('open');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeLetter();
});

/* ============================================================================
   Ambient animations: stars, balloons, floating hearts, confetti, fireworks
   ============================================================================ */

/* ---- twinkling stars ---- */
(function starsInit(){
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({length: 90}, () => ({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height*0.7,
      r: Math.random()*1.4 + 0.3,
      phase: Math.random()*Math.PI*2,
      speed: Math.random()*0.02 + 0.005,
    }));
  }
  window.addEventListener('resize', resize);
  resize();

  function draw(t){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (const s of stars) {
      const alpha = 0.35 + 0.5*Math.abs(Math.sin(s.phase + t*s.speed));
      ctx.fillStyle = `rgba(253,246,236,${alpha.toFixed(2)})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

/* ---- balloons ---- */
const balloonColors = ['#e8b14d','#f2a6b0','#ff7a59','#8e6ac7','#5fb3a3'];
const balloonLayer = document.getElementById('balloon-layer');

function spawnBalloon(){
  const b = document.createElement('div');
  b.className = 'balloon';
  const color = balloonColors[Math.floor(Math.random()*balloonColors.length)];
  b.style.background = color;
  b.style.left = (Math.random()*90 + 2) + 'vw';
  const duration = 9 + Math.random()*6;
  b.style.animationDuration = duration + 's';
  const size = 34 + Math.random()*24;
  b.style.width = size + 'px';
  b.style.height = (size*1.25) + 'px';
  balloonLayer.appendChild(b);
  setTimeout(() => b.remove(), duration*1000 + 200);
}
setInterval(spawnBalloon, 1400);
for (let i=0;i<4;i++) setTimeout(spawnBalloon, i*400);

/* ---- floating hearts (ambient, low frequency; heavier after birthday) ---- */
const heartLayer = document.getElementById('heart-layer');
function spawnHeart(){
  const h = document.createElement('div');
  h.className = 'fheart';
  h.textContent = Math.random() > 0.5 ? '❤' : '💗';
  h.style.left = (Math.random()*92 + 2) + 'vw';
  const duration = 6 + Math.random()*4;
  h.style.animationDuration = duration + 's';
  h.style.fontSize = (1 + Math.random()*1.1) + 'rem';
  heartLayer.appendChild(h);
  setTimeout(() => h.remove(), duration*1000 + 200);
}
setInterval(() => spawnHeart(), 2600);

function burstHearts(n){
  for (let i=0;i<n;i++) setTimeout(spawnHeart, i*60);
}

/* ---- confetti ---- */
(function confettiInit(){
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  let pieces = [];
  const colors = ['#e8b14d','#f2a6b0','#ff7a59','#fdf6ec','#8e6ac7'];

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function addPieces(n){
    for (let i=0;i<n;i++){
      pieces.push({
        x: Math.random()*canvas.width,
        y: -20 - Math.random()*canvas.height*0.4,
        w: 5 + Math.random()*5,
        h: 8 + Math.random()*6,
        color: colors[Math.floor(Math.random()*colors.length)],
        vy: 1 + Math.random()*2.2,
        vx: (Math.random()-0.5)*1.4,
        rot: Math.random()*Math.PI,
        vrot: (Math.random()-0.5)*0.2,
      });
    }
  }
  window.confettiBurst = (n) => addPieces(n || 80);
  addPieces(40);

  function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.vrot;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    pieces = pieces.filter(p => p.y < canvas.height + 30);
    if (pieces.length < 60 && Math.random() < 0.06) addPieces(2);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();

/* ---- fireworks ---- */
(function fireworksInit(){
  const canvas = document.getElementById('firework-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const colors = ['#e8b14d','#f2a6b0','#ff7a59','#fdf6ec','#8e6ac7','#5fb3a3'];

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function launch(x, y, big){
    const color = colors[Math.floor(Math.random()*colors.length)];
    const count = big ? 70 : 40;
    for (let i=0;i<count;i++){
      const angle = (Math.PI*2*i)/count;
      const speed = (big ? 3.5 : 2.2) + Math.random()*2;
      particles.push({
        x, y,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed,
        life: 60 + Math.random()*30,
        age: 0,
        color,
      });
    }
  }
  window.fireworkLaunch = launch;

  function autoLaunch(){
    const x = canvas.width*(0.15 + Math.random()*0.7);
    const y = canvas.height*(0.15 + Math.random()*0.35);
    launch(x, y, false);
    const next = 2800 + Math.random()*3200;
    setTimeout(autoLaunch, next);
  }
  setTimeout(autoLaunch, 900);

  function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
      p.age++;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.03;
      const alpha = Math.max(0, 1 - p.age/p.life);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    particles = particles.filter(p => p.age < p.life);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();

function celebrateBig(){
  const canvas = document.getElementById('firework-canvas');
  for (let i=0;i<6;i++){
    setTimeout(() => {
      const x = canvas.width*(0.15 + Math.random()*0.7);
      const y = canvas.height*(0.15 + Math.random()*0.35);
      window.fireworkLaunch(x, y, true);
    }, i*350);
  }
  window.confettiBurst(160);
  burstHearts(30);
  for (let i=0;i<10;i++) setTimeout(spawnBalloon, i*180);
}
</script>
